name: Validate skills

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install ${{ matrix.python-version }}

      - name: Sync tooling dependencies
        run: uv sync --locked --python ${{ matrix.python-version }}

      - name: Validate skills
        run: uv run --python ${{ matrix.python-version }} python scripts/validate_skills.py

      - name: Run tooling tests
        run: uv run --python ${{ matrix.python-version }} python -m unittest discover -s tests -v

      - name: Lint and check formatting
        run: |
          uv run --python ${{ matrix.python-version }} ruff check .
          uv run --python ${{ matrix.python-version }} ruff format --check .

      - name: Build skill packages
        run: uv run --python ${{ matrix.python-version }} python scripts/package_skill.py --all --output /tmp/kolega-skill-dist

      - name: Upload packages
        if: matrix.python-version == '3.14'
        uses: actions/upload-artifact@v4
        with:
          name: kolega-skills
          path: /tmp/kolega-skill-dist/
